name: update-heatmap
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Regenerar heatmap
        env:
          GH_USER: sudohackri
        run: python scripts/gen_heatmap.py
      - name: Commit si cambió
        run: |
          if [[ -n "$(git status --porcelain assets/heatmap.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/heatmap.svg
            git commit -m "chore: refresh heatmap [skip ci]"
            git push
          else
            echo "sin cambios"
          fi
